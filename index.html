<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Sim</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent2: #0077ff;
      --text: #f0f0f0;
      --muted: #666;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    header {
      width: 100%;
      max-width: 700px;
      margin-bottom: 3rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header span {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .screen { display: none; width: 100%; max-width: 700px; }
    .screen.active { display: block; }

    /* ── Settings screen ── */
    .settings-title {
      font-size: 32px;
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 2.5rem;
      color: var(--text);
    }

    .settings-title strong {
      font-weight: 500;
      color: var(--accent);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .field {
      background: var(--surface);
      padding: 1.5rem;
      transition: background 0.15s;
    }

    .field:hover { background: var(--surface2); }

    .field label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .field input[type=number] {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      -moz-appearance: textfield;
    }

    .field input[type=number]::-webkit-outer-spin-button,
    .field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .field .unit {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 0.4rem;
    }

    .run-btn {
      width: 100%;
      padding: 1.1rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .run-btn:hover { opacity: 0.88; }
    .run-btn:active { transform: scale(0.99); }

    .status {
      margin-top: 1rem;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite;
      display: none;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Results screen ── */
    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .results-title {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-btn:hover { border-color: var(--text); color: var(--text); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1px;
    }

    .metric {
      background: var(--surface);
      padding: 1.5rem;
    }

    .metric-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    .metric-val {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
    }

    .metric-val.blue { color: var(--accent2); }
    .metric-val.white { color: var(--text); }

    .metric-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .chart-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.5rem;
      margin-top: 1px;
    }

    .chart-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
    }

    .params-strip {
      margin-top: 1px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      border-radius: 2px;
      display: flex;
      gap: 2rem;
    }

    .param {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .param span { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>Queue Sim</h1>
 
</header>

<!-- Settings Screen -->
<div id="screen-settings" class="screen active">
  <p class="settings-title">Configure your<br><strong>simulation parameters.</strong></p>

  <div class="fields">
    <div class="field">
      <label>Servers</label>
      <input type="number" id="servers" value="3" min="1" max="20">
      <div class="unit">concurrent</div>
    </div>
    <div class="field">
      <label>Arrival rate</label>
      <input type="number" id="arrival" value="5" min="1" max="60">
      <div class="unit">customers / min</div>
    </div>
    <div class="field">
      <label>Service time</label>
      <input type="number" id="service" value="8" min="1" max="120">
      <div class="unit">minutes avg</div>
    </div>
  </div>

  <button class="run-btn" onclick="startSim()">Run Simulation</button>

  <div class="status" id="status-msg">
    <div class="dot" id="dot"></div>
    <span id="status-text"></span>
  </div>
</div>

<!-- Results Screen -->
<div id="screen-results" class="screen">
  <div class="results-header">
    <div class="results-title">Simulation Results</div>
    <button class="back-btn" onclick="goBack()">← New run</button>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Avg wait time</div>
      <div class="metric-val" id="m-avg">—</div>
      <div class="metric-sub">minutes per customer</div>
    </div>
    <div class="metric">
      <div class="metric-label">Max queue length</div>
      <div class="metric-val blue" id="m-max">—</div>
      <div class="metric-sub">peak customers waiting</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total served</div>
      <div class="metric-val white" id="m-total">—</div>
      <div class="metric-sub">customers processed</div>
    </div>
  </div>

  <div class="chart-block">
    <div class="chart-label">Queue length over time</div>
    <canvas id="chart-queue" height="160"></canvas>
  </div>

  <div class="chart-block">
    <div class="chart-label">Average wait time over time</div>
    <canvas id="chart-wait" height="160"></canvas>
  </div>

  <div class="params-strip" id="params-strip"></div>
</div>

<script>
  // ── Fake CSV (replace with fetch('results.csv') once C++ is ready) ──
  const fakeCSV = `minute,queue_length,customers_served,avg_wait_time
1,0,0,0
2,1,1,1.5
3,2,2,2.0
4,3,3,3.1
5,2,4,2.8
6,1,5,2.5
7,3,6,4.0
8,4,7,4.5
9,2,8,3.8
10,1,9,3.2
11,3,10,4.1
12,5,11,5.2
13,4,12,4.9
14,2,13,4.0
15,1,14,3.5
16,3,15,3.9
17,4,16,4.4
18,5,17,5.1
19,3,18,4.6
20,2,19,4.0`;

  let qChart, wChart;
  let simParams = {};

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',');
    return lines.slice(1).map(line => {
      const vals = line.split(',');
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = parseFloat(vals[i]));
      return obj;
    });
  }

  function startSim() {
    const servers = parseInt(document.getElementById('servers').value);
    const arrival = parseInt(document.getElementById('arrival').value);
    const service = parseInt(document.getElementById('service').value);
    simParams = { servers, arrival, service };

    // Show loading state
    document.getElementById('dot').style.display = 'block';
    document.getElementById('status-text').textContent = 'Writing settings.txt and running simulation...';
    document.querySelector('.run-btn').disabled = true;

    // ── TODO: replace this block with your real server call ──
    // fetch('/run', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ servers, arrival_rate: arrival, service_time: service })
    // })
    // .then(r => r.text())
    // .then(csv => showResults(csv));

    // Fake delay simulating the C++ exe running
    setTimeout(() => {
      document.getElementById('dot').style.display = 'none';
      document.getElementById('status-text').textContent = '';
      document.querySelector('.run-btn').disabled = false;
      showResults(fakeCSV);
    }, 900);
  }

  function showResults(csvText) {
    const data = parseCSV(csvText);
    const labels = data.map(r => 'Min ' + r.minute);
    const queueData = data.map(r => r.queue_length);
    const waitData  = data.map(r => parseFloat(r.avg_wait_time.toFixed(1)));

    const avgWait  = (waitData.reduce((a,b)=>a+b,0) / waitData.length).toFixed(1);
    const maxQueue = Math.max(...queueData);
    const total    = data[data.length - 1].customers_served;

    document.getElementById('m-avg').textContent   = avgWait + ' min';
    document.getElementById('m-max').textContent   = maxQueue;
    document.getElementById('m-total').textContent = total;

    document.getElementById('params-strip').innerHTML =
      `<div class="param">servers <span>${simParams.servers}</span></div>
       <div class="param">arrival rate <span>${simParams.arrival}/min</span></div>
       <div class="param">service time <span>${simParams.service} min</span></div>`;

    document.getElementById('screen-settings').classList.remove('active');
    document.getElementById('screen-results').classList.add('active');

    if (qChart) qChart.destroy();
    if (wChart) wChart.destroy();

    const gridColor  = '#2a2a2a';
    const tickColor  = '#555';
    const sharedOpts = {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1c1c1c',
        borderColor: '#2a2a2a',
        borderWidth: 1,
        titleColor: '#aaa',
        bodyColor: '#f0f0f0',
        titleFont: { family: 'Space Mono', size: 10 },
        bodyFont:  { family: 'Space Mono', size: 12 }
      }},
      scales: {
        x: { ticks: { color: tickColor, font: { family: 'Space Mono', size: 10 } }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, font: { family: 'Space Mono', size: 10 } }, grid: { color: gridColor }, beginAtZero: true }
      }
    };

    qChart = new Chart(document.getElementById('chart-queue'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data: queueData, backgroundColor: '#0077ff', borderRadius: 2, borderSkipped: false }]
      },
      options: sharedOpts
    });

    wChart = new Chart(document.getElementById('chart-wait'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: waitData,
          borderColor: '#00e5a0',
          backgroundColor: 'rgba(0,229,160,0.06)',
          tension: 0.4,
          fill: true,
          pointRadius: 3,
          pointBackgroundColor: '#00e5a0'
        }]
      },
      options: sharedOpts
    });
  }

  function goBack() {
    document.getElementById('screen-results').classList.remove('active');
    document.getElementById('screen-settings').classList.add('active');
  }
</script>
</body>
</html>
